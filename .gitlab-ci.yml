stages:
  - build
  - test
  - deploy

cache:
  paths:
    - node_modules/
    - .npm/

build:
  stage: build
  image: node:22-alpine
  before_script:
    - apk add --no-cache libxslt
    - xsltproc --version
    - node --version
    - npm --version
    - mkdir -p docs
  script:
    - chmod +x process.sh
    - ./process.sh
    - ls -la docs/
    - test -f docs/index.html
  artifacts:
    paths:
      - docs/
    expire_in: 1 day
  only:
    changes:
      - src/**/*
      - scripts/**/*
      - process.sh
      - .gitlab-ci.yml

test_html:
  stage: test
  image: alpine:3.20
  dependencies:
    - build
  before_script:
    - apk add --no-cache file
  script:
    - test -s docs/index.html
    - file docs/index.html | grep -i html
    - grep -q "<html" docs/index.html
    - grep -q "</html>" docs/index.html
    - grep -q "<head" docs/index.html
    - grep -q "<body" docs/index.html
    - ls -lh docs/index.html
  only:
    changes:
      - src/**/*
      - scripts/**/*
      - process.sh
      - .gitlab-ci.yml

deploy_cloudflare:
  stage: deploy
  image: node:22-alpine
  dependencies:
    - build
  script:
    - npx wrangler@latest pages deploy docs --project-name=sindict
  only:
    changes:
      - src/**/*
      - scripts/**/*
      - process.sh
      - .gitlab-ci.yml
